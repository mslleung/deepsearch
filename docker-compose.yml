services:
  deepsearch:
    # Use locally built Jib image (build with: ./gradlew :presentation:jibDockerBuild --no-configuration-cache)
    image: deepsearch:latest
    container_name: deepsearch
    ports:
      - "8080:8080"
    environment:
      # URL for browser service (adjust based on how deepsearch-browser is running)
      - DEEPSEARCH_BROWSER_URL=${DEEPSEARCH_BROWSER_URL}
    env_file:
      - .env

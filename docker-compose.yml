services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: deepsearch-postgres
    environment:
      POSTGRES_USER: $DB_USERNAME
      POSTGRES_PASSWORD: $DB_PASSWORD
      POSTGRES_DB: $DB_NAME
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deepsearch -d deepsearch"]
      interval: 5s
      timeout: 5s
      retries: 5

  deepsearch:
    # Use locally built Jib image (build with: ./gradlew :presentation:jibDockerBuild --no-configuration-cache)
    image: deepsearch:latest
    container_name: deepsearch
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Override DB_HOST to use the postgres service name within Docker network
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

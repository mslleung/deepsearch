services:
  postgres:
    # Custom PostgreSQL image with pgvector AND Apache AGE extensions
    # Build with: docker build -f Dockerfile.postgres -t deepsearch-postgres:latest .
    build:
      context: .
      dockerfile: Dockerfile.postgres
    image: deepsearch-postgres:latest
    container_name: deepsearch-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  deepsearch:
    # Use locally built Jib image (build with: ./gradlew :presentation:jibDockerBuild --no-configuration-cache)
    image: deepsearch:latest
    container_name: deepsearch
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Override DB_HOST to use the postgres service name within Docker network
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

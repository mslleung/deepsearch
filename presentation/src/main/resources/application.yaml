ktor:
    development: true  # Enable development mode by default for local development
    application:
        modules:
            - io.deepsearch.presentation.ApplicationKt.module
    deployment:
        port: 8080
jwt:
    publicKey: ${JWT_PUBLIC_KEY}  # Read from environment
    privateKey: ${JWT_PRIVATE_KEY}  # Read from environment
    issuer: "deepsearch"
    audience: "deepsearch-users"
    realm: "DeepSearch Web App API"
oauth:
    google:
        clientId: ${GOOGLE_OAUTH_CLIENT_ID}
        clientSecret: ${GOOGLE_OAUTH_CLIENT_SECRET}
        redirectUrl: "http://localhost:8080/api/auth/oauth/google/callback"
apiKey:
    hmacSecret: ${API_KEY_HMAC_SECRET}  # For HMAC-SHA256 hashing of API keys
database:
    encryptionSecret: ${DATABASE_ENCRYPTION_SECRET}  # For AES-256-GCM encryption of sensitive database columns
    postgres:
        host: ${DB_HOST}
        port: ${DB_PORT}
        database: ${DB_NAME}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
serper:
    apiKey: ${SERPER_API_KEY}
gemini:
    apiKey: ${GOOGLE_API_KEY}
vertexai:
    projectId: ${GOOGLE_CLOUD_PROJECT}
    location: ${GOOGLE_CLOUD_LOCATION}
stripe:
    secretKey: ${STRIPE_SECRET_KEY}
    publishableKey: ${STRIPE_PUBLISHABLE_KEY}
    webhookSecret: ${STRIPE_WEBHOOK_SECRET}
ktor:
    development: true  # Enable development mode for admin panel
    application:
        modules:
            - io.deepsearch.presentation.AdminApplicationKt.adminModule
    deployment:
        port: 8081
apiKey:
    hmacSecret: ${API_KEY_HMAC_SECRET}  # For HMAC-SHA256 hashing of API keys
database:
    encryptionSecret: ${DATABASE_ENCRYPTION_SECRET}  # For AES-256-GCM encryption of sensitive database columns
